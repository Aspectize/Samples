<!DOCTYPE html>
<html xmlns:aas="http://aspectize.com/ajax">
<head>
    <title>Untitled</title>
</head>
<body>
    
    <div aas-control="MainControl">
        <nav role="navigation" class="navbar navbar-inverse navbar-fixed-top">
          <div class="container">
            <div class="navbar-header">
              <button aria-controls="navbar" aria-expanded="false" data-target="#navbar" data-toggle="collapse" class="navbar-toggle collapsed" type="button">
                <span class="sr-only">Toggle navigation</span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
              </button>
              <a name="Home" class="navbar-brand">Aspectize Clipboard</a>
                <a name="Clipboards" class="hidden navbar-brand" >Clipboards</a>
            </div>
            <div class="collapse navbar-collapse"></div>
          </div>
        </nav>
        <div aas-name="Content" class="Panel container" aas-type="Panel"></div>
    </div>

    <div aas-control="Welcome">
        <div class="form form-horizontal text-center">
            <br />
            <br />
            <div class="row row-alert">
                <div class="span12">
                    <div class="hidden alert alert-danger text-center error-form"></div>
                </div>
            </div>
            <div class="form-group form-group-Code">
                <label for="Welcome-Code" class="col-sm-6 control-label">Types clipboard code</label>
                <div class="col-sm-6">
                    <input type="text" maxlength="6" class="form-control" name="Code" autofocus="autofocus" style="max-width: 100px;" />
                </div>
            </div>
            <br />
            <div class="form-group">
                <button class="btn btn-success" name="BtnEnter">Enter</button>
            </div>
        </div>
        <br />
    </div>

    <div aas-control="ClipboardEdit">
        <div><h1><span>{libelle}</span><span class="pull-right">{Code}</span></h1></div>
        <input name="Update" type="button" value="Update" />
        <br />
        <textarea class="ClipboardContent" cols="20" name="TxtClipboard"></textarea>
   </div>

    <div aas-control="ClipboardRead">
        <div><h1><span>{libelle}</span><span class="pull-right">{Code}</span></h1></div>
        <input name="Update" type="button" value="Update" />
        <br />
        <textarea readonly class="ClipboardContent" cols="20" name="TxtClipboard"></textarea>
        <div aas-name="Timer" class="AspectizeTimer" aas-type="AspectizeTimer"></div>
    </div>

    <div aas-control="Clipboards">
        <button class="btn btn-primary" name="Create">Create a new clipboard</button>
        <div aas-name="GridClipboards" aas-type="Bootstrap.BootstrapGrid"></div>    
    </div>

    <div aas-control="name:'NewClipboard', isModal:true">
        <div class="modal fade">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h4 class="modal-title">Create a clipboard</h4>
                    </div>
                    <div class="modal-body">
                        <div role="form">
                            <div class="form-group">
			                    <label>Name</label>
			                    <input type="text" class="form-control" placeholder="Clipboard name" name="TxtName" class="input-xlarge" autofocus="autofocus"  />
                            </div>
				            <div class="form-group">
					            <div class="col-xs-12 text-center">
                                    <button class="btn btn-primary" name="Create">Create</button>
                                    <button class="btn btn-default" name="Cancel">Cancel</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div aas-control="name:'ErrorControl', isModal:true">
        <div class="modal fade">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h4 class="modal-title">Warning</h4>
                    </div>
                    <div class="modal-body">
                        <div class="text">
                            <p><span class="ErrorMessage">{ErrorMessage}</span></p>
                        </div>
                    </div>
                    <div class="modal-footer">
			            <button class="btn btn-primary" name="btnOk" data-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
