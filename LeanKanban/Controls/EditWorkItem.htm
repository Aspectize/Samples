<!DOCTYPE html>
<html>
<head>
    <title>Untitled</title>
</head>
<body>


    <div aas-control="name:'EditWorkItem', isModal:true">
        <div class="modal fade">
            <div class="modal-dialog" style="width: 1200px;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h4 class="modal-title">Edit WorkItem</h4>
                    </div>
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-9">
                                <div class="EditWorkItemDueDate {DisplayDueDate}">
                                    <div class="DueDateTitle">Due Date</div>
                                    <a name="WorkItemDueDateLink" class="DueDateBadge" title="This workitem is due later">{WorkItemDueDate}</a>
                                </div>

                                <div class="form-group">
                                    <label>Title:</label>
                                    <input name="Title" class="form-control" autofocus="autofocus" />
                                    <div class="hidden alert alert-danger text-center error-Title"></div>
                                </div>
                                <div class="form-group">
                                    <label>Description:</label>
                                    <textarea cols="20" name="Description" rows="4" class="form-control"></textarea>
                                </div>

                                <div class="form-group {DisplayAttachment}">
                                    <label>Attachements:</label>
                                    <div>
                                        <div aas-name="AttachmentRepeaterPanel" aas-type="AspectizeRepeaterPanel"></div>
                                    </div>
                                    <div aas-name="UploaderAttachment" aas-type="AspectizeFileUpload"></div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <h4>Add</h4>
                                <div class="form-group">
                                    <a name="DueDate" class="button-link" title="Add a due date for the card and get notifications when it is almost due."> <span class="icon-sm icon-clock"></span> Due date </a>
                                    <div aas-name="UploaderAttachmentAdd" aas-type="AspectizeFileUpload" class="button-link"></div>
                                </div>
                                <br />
                                <h4>Action</h4>
                                <div class="form-group">
                                    <a name="Move" class="button-link" title="Move this card to another board, another list"> <span class="icon-sm icon-clock"></span> Move </a>
                                </div>

                            </div>
                        </div>

                    </div>
                    <div class="modal-footer">
                        <button name="Cancel" class="btn btn-default">Cancel</button>
                        <button name="Save" class="btn btn-primary">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>


</body>
</html>
