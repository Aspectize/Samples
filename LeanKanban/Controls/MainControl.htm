<!DOCTYPE html>
<html xmlns:aas="http://aspectize.com/ajax">
<head>
    <title>Untitled</title>
</head>
<body>

    <div aas:control="MainControl">
        <nav role="navigation" class="navbar navbar-inverse navbar-fixed-top">
          <div class="container">
            <div class="navbar-header">
              <button aria-controls="navbar" aria-expanded="false" data-target="#navbar" data-toggle="collapse" class="navbar-toggle collapsed" type="button">
                <span class="sr-only">Toggle navigation</span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
              </button>
              <a name="Boards" class="navbar-brand">LeanKanban</a>
            </div>
            <div class="collapse navbar-collapse" id="navbar">
                <ul class="nav navbar-nav navbar-right">
                    <li class="hidden-xs hidden-sm dropdown {ShowRegister}">
                        <a href="#" class="dropdown-toggle" data-toggle="dropdown" style="color: #FFFFFF;">Welcome <span>{UserName}</span><span class="caret"></span></a>
                        <ul class="dropdown-menu" role="menu">
                            <li><a aas:name="LogOut">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div><!--/.nav-collapse -->
          </div>
        </nav>
        <div aas:name="Content" class="Panel container"></div>
    </div>

    <div aas:control="MyBoards">
        <h1>My Boards</h1>
        
        <div class="row">
            <div class="StateContainer">
                <div aas:name="RepeaterPanelBoard" class="AspectizeRepeaterPanel"></div>
            </div>
            <div>
                <a name="BtnNewBoard" class="NewBoardItem">Add a board...</a>
            </div>
            <div class="clear"></div>
        </div>
    </div>

    <div aas:control="Board">
        <h1>{BoardName}</h1>
        
        <div class="row">
            <div class="StateContainer">
                <div aas:name="RepeaterPanelState" class="AspectizeRepeaterPanel"></div>
            </div>
            <div>
                <a name="BtnNewState" class="NewStateItem">Add a list...</a>
            </div>
            <div class="clear"></div>
        </div>
    </div>

    <div aas:control="BoardItem">
        <a name="BoardItem" class="BoardItem">
            <div>{Title}</div>
        </a>
    </div>


    <div aas:control="StateItem">
        <div class="StateItem">
            <div class="StateItemTitle">{Title}</div>
            <div class="">
                <div aas:name="RepeaterPanelWorkItem" class="AspectizeRepeaterPanel"></div>
            </div>
            <a name="BtnNewWorkItem">Add a card...</a>
        </div>
    </div>


    <div aas:control="WorkItem">
        <a name="WorkItem" class="WorkItem">
            <div>{Title}</div>
            <div></div> 
        </a>
    </div>

    <div aas:control="name:'EditState', isModal:true">
        <div class="modal fade">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h4 class="modal-title">{ViewTitle}</h4>
                    </div>
                    <div class="modal-body">
                        <div class="form">
                            <div class="form-group">
                                <label>{LabelTxtName}</label>
                                <input name="TxtName" class="form-control" autofocus="autofocus" />
                                <div class="hidden alert alert-danger text-center error-TxtName"></div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button name="Cancel" class="btn btn-default">Cancel</button>
                        <button name="Save" class="btn btn-primary">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <div aas:control="name:'EditWorkItem', isModal:true">
        <div class="modal fade">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h4 class="modal-title">Edit WorkItem</h4>
                    </div>
                    <div class="modal-body">
                        <div class="form">
                            <div class="form-group">
                                <label>Title:</label>
                                <input name="Title" class="form-control"  autofocus="autofocus" />
                                <div class="hidden alert alert-danger text-center error-Title"></div>
                            </div>
                            <div class="form-group">
                                <label>Description:</label>
                                <textarea cols="20" name="Description" rows="4" class="form-control" ></textarea>
                            </div>
                            <div class="form-group">
                                <label>State:</label>
                                <select name="SelectState" class="form-control" ></select>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button name="Cancel" class="btn btn-default">Cancel</button>
                        <button name="Save" class="btn btn-primary">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
