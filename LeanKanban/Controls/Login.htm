<!DOCTYPE html>
<html>
<head>
    <title></title>
</head>
<body>

    <div aas:control="Login">
        <h1 class="text-center">Login</h1>
        <div class="form">
            <div class="form-group">
                <label>UserName</label>
                <input name="TxtUserName" type="text" class="form-control" placeholder="User Name" autofocus="autofocus" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input name="TxtPwd" type="password" class="form-control" placeholder="Password" />
            </div>
            <div class="form-group">
                <div class="checkbox">
                    <label>
                        <input name="CheckBoxRememberMe" type="checkbox" />Remember me
                    </label>
                    <a aas:name="ResetPassword" class="btn btn-link pull-right">Forgot your password ?</a>
                </div>
            </div>
            <div class="form-group">
                <button name="BtnLogin" class="btn btn-success">Login</button>
                <a aas:name="Register" class="btn btn-link pull-right">Not member ?</a>
                <br /><br />
                <div class="control-group">
                    <div class="LoginAlert alert fade in" aria-hidden="true"></div>
                </div>
            </div>
        </div>
    </div>

    <div aas:control="Register">
        <h1 class="text-center">Register</h1>
        <div class="form">
            <div class="HideFormOnSuccess">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" class="form-control input-xlarge" placeholder="First name" name="TxtFirstName" autofocus="autofocus" />
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" class="form-control input-xlarge" placeholder="Last name" name="TxtLastName" />
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="text" class="form-control input-xlarge" placeholder="Email" name="TxtEmail" />
                </div>
                <button class="btn btn-primary" name="SignUp">Create an account</button>
                <a aas:name="Login" class="btn btn-link pull-right">Already member ?</a>
            </div>
            <br /><br />
            <div class="control-group">
                <div class="RegisterAlert alert fade in" aria-hidden="true"></div>
            </div>
        </div>

    </div>

    <div aas:control="name:'ConfirmUser', isModal:true">
        <div class="modal fade">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h4 class="modal-title">Welcome to LeanKan</h4>
                    </div>
                    <div class="modal-body">
                        <div class="form">
                            Your login is <b><span>{Login}</span></b>
                            <br /><br />
                            Please confirm your registration and choose your password.
                            <br /><br />
                            <div class="form-group">
                                <label>Password:</label>
                                <input type="password" class="form-control" placeholder="PassWord" name="TxtPwd" autofocus="autofocus" />
                            </div>
                            <div class="form-group">
                                <label>Confirm your password:</label>
                                <input type="password" class="form-control" placeholder="Confirm password" name="TxtPwdConfirm" />
                            </div>
                            <div class="form-group">
                                <div class="checkbox">
                                    <label>
                                        <input name="CheckBoxRememberMe" type="checkbox" />Remember me
                                    </label>
                                </div>
                            </div>

                            <div class="control-group">
                                <div class="ConfirmUserAlert alert fade in" aria-hidden="true"></div>
                            </div>
                            <div class="control-group">
                                <button class="btn btn-primary" name="BtnSave">Confirm registration</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div aas:control="name:'ResetPassword', isModal:true">
        <div class="modal fade">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h4 class="modal-title">Reset your password</h4>
                    </div>
                    <div class="modal-body">
                        <div class="form">
                            Fill your email address and we send you an email with a link to reset your password.
                            <br /><br />
                            <div class="form-group">
                                <label>Email</label>
                                <input type="text" class="form-control input-xlarge" placeholder="Email" name="TxtEmail" />
                            </div>
                            <div class="control-group">
                                <div class="ConfirmUserAlert alert fade in" aria-hidden="true"></div>
                            </div>
                            <div class="control-group">
                                <button class="btn btn-primary" name="BtnSave">Reset password</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


</body>
</html>
