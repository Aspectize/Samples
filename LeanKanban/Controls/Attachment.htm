<!DOCTYPE html>
<html>
<head>
    <title>Untitled</title>
</head>
<body>

    <div aas:control="AttachmentItem">
        <div class="row">
            <div class="col-sm-3"><div aas:name="ImageAttachment" aas:type="AspectizeImage" class="ImageAttachment"></div></div>            
            <div class="col-sm-9">

        </div>
    </div>

</html>
