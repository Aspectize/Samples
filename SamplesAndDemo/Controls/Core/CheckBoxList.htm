            </div>
            <div class="pull-right LinkFiles">
                <ul>
                    <li>
                        <a href="https://github.com/Aspectize/Samples/blob/master/SamplesAndDemo/Controls/Core/CheckBoxList.htm" target="_blank">View Html</a>

        <h2>Basic Usage with related entities</h2>
        <div class="row">
            <div class="col-sm-2">
                Select a Sales:
                <div aas:name="GridSalesPerson" aas:type="AspectizeGrid"></div>
            </div>
            <div class="col-sm-3">
                Select a Sales Order:
                <div aas:name="GridSalesOrder" aas:type="AspectizeGrid"></div>
            </div>
            <div class="col-sm-5">
                Select sales reason associated to Sale Order: each check will associate a SalesReason to SalesOrder.
                <div aas:name="CheckBoxListDemo" aas:type="AspectizeCheckBoxList"></div>
