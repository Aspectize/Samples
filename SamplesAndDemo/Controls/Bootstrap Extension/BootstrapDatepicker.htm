<!DOCTYPE html>
<html xmlns:aas="http://aspectize.com/ajax">
<head>
    <title>Untitled</title>
</head>
<body>

    <div aas:control="BootstrapDatepickerControl">
        <h1 class="page-header">Bootstrap Datepicker</h1>

        <div class="row">
            <div class="col-sm-3 form-group">
                <div aas:name='BootstrapDatePickerSample' class='BootstrapDatePicker input-group date'>
                    <input type='text' class="form-control" />
                    <span class="input-group-addon"><span class="fa fa-calendar"></span>
                    </span>
                </div>
            </div>
        </div>

        <div class="row">
            Date selected: <span>{DateSelected}</span>
        </div>
    </div>

</body>
</html>
