<!DOCTYPE html>
<html>
<head>
    <title>Untitled</title>
</head>
<body>

    <div aas-control="BootstrapDatepickerControl">
        <div class="row">
            <div class="pull-left">
                <h1 class="page-header">Bootstrap Datepicker</h1>
            </div>
            <div class="pull-right LinkFiles">
                <ul>
                    <li>
                        <a href="https://github.com/Aspectize/Samples/blob/master/SamplesAndDemo/Controls/BootstrapExtension/BootstrapDatepicker.htm" target="_blank">View Html</a>
                    </li>
                    <li>
                        <a href="https://github.com/Aspectize/Samples/blob/master/SamplesAndDemo/Configuration/Views/BootstrapExtension/BootstrapDatepicker.js" target="_blank">View Configuration</a>
                    </li>
                </ul>
            </div>
        </div>
        <div class="row">
            <div class="col-md-2">
                Stepping:
            </div>
            <div class="col-md-2">
                <input name="TxtStepping" type="number" class="form-control" />
            </div>
        </div>

        <br />
        <div class="row">
            <div class="col-sm-3 form-group">
                <div aas-name='BootstrapDatePickerSample' aas-type='BootstrapDateTimePicker.BootstrapDateTimePicker' class='input-group date'>
                    <input type='text' class="form-control" />
                    <span class="input-group-addon">
                        <span class="fa fa-calendar"></span>
                    </span>
                </div>
            </div>
        </div>

        <div class="row">
            Date selected: <span>{DateSelected}</span>
        </div>
    </div>

</body>
</html>
